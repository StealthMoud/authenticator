<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticator</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="header-main">
        <img src="icons/icon48.png" alt="Logo" class="logo">
        <h1>Authenticator</h1>
      </div>
      <div class="header-actions">
        <button id="clear-all-btn" title="Clear All Accounts" class="secondary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </button>
        <button id="import-btn" title="Import QR Code">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
        </button>
      </div>
    </header>

    <div class="search-container">
      <div class="search-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search accounts...">
      </div>
    </div>

    <main id="account-list" class="account-list">
      <!-- Accounts will be rendered here -->
      <div class="empty-state">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
        </div>
        <p>No accounts yet</p>
        <button id="add-first-btn">Import QR Code</button>
      </div>
    </main>

    <div id="import-modal" class="modal hidden">
      <div class="modal-content">
        <button class="close-modal">&times;</button>
        <h2>Import Account</h2>
        <p>Upload a QR code image exported from your authenticator app.</p>
        <div id="drop-zone" class="drop-zone">
          <div class="drop-zone-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
          </div>
          <p>Drop QR image here or click to upload</p>
          <input type="file" id="file-input" accept="image/*" hidden>
        </div>
        <div id="import-status" class="status-message"></div>
      </div>
    </div>

    <footer>
      <div class="progress-container">
        <div id="global-timer" class="progress-bar"></div>
      </div>
    </footer>
  </div>

  <script src="lib/jsQR.js"></script>
  <script src="lib/otpauth.js"></script>
  <script src="popup.js"></script>
</body>
</html>
